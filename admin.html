

<!DOCTYPE html>
<html>
<head>
    <button id="login" onclick="login()">Login</button>
    <meta charset="UTF-8">
    <title>ADMIN PAGE</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
</head>
<body>
    <div class="inner" id="title">
        Simple Admin Page
    </div>
    <div class="inner">
        <div class="box">
            <input type="text" id="username" placeholder="Username want to create" required>
            <button id="create" onclick='create()'>Create</button>
        </div>
    </div>
    <br>
    <div class="inner">
        <div class="box">
            <input type="hidden" id="_method" value="PATCH"/>
            <input type="text" id="username1" placeholder="Username want to change" required><br>
            <input type="text" id="username2" placeholder="Username want to set" required>
            <button id="update" onclick='update()'>Update</button>
        </div>
    </div>
    <br>
    <div class="inner">
        <div class="box">
            <input type="hidden" id="_method" value="DELETE"/>
            <input type="text" id="username" placeholder="Username want to delete" required>
            <button id="delete" onclick='del()'>Delete</button>
        </div>
    </div>
</body>
<script>
    function request(URL, method, body){
    fetch(URL, {
        method: method,
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify(body)})
        .then((data) => console.log(data));
    }
    function create(){
        request('https://boj-ranking-tqomc.run.goorm.io/user/'+$('.user-create #username').val(), 'POST', {});
    }
    function update() {
        request('https://boj-ranking-tqomc.run.goorm.io/user/'+$('.user-update #username1').val(), 'PATCH', {username2:$('.user-update #username2').val()});
    }
    function del() {
        request('https://boj-ranking-tqomc.run.goorm.io/user/'+$('.user-delete #username').val(), 'DELETE', {})
        
        
    }
    function login() {
        request('https://boj-ranking-tqomc.run.goorm.io/user/login', 'GET', {});
    }
    //$('#myMessage').val()
        /*
        .then((response) => response.json())
        .then((data) => console.log(data));*/
</script>
